services:

  db:
    image: postgres:17

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_DB: league_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # M1-01: healthcheck para que el backend espere a que Postgres acepte conexiones.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d league_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./

    container_name: django_backend

    command: >
      sh -c " python manage.py migrate && python manage.py runserver 0.0.0.0:8000 "

    volumes:
      - ./:/app

    ports:
      - "8000:8000"

    environment:
      DB_NAME: league_db
      DB_USER: admin
      DB_PASSWORD: admin
      DB_HOST: db
      DB_PORT: 5432
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}

    # M1-01: el backend solo arranca cuando la base de datos reporta healthy,
    # evitando fallos de conexión silenciosos en el arranque.
    depends_on:
      db:
        condition: service_healthy

    # M1-01: healthcheck del backend (comprueba que el puerto 8000 acepta conexiones).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8000), 3).close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend/react

    container_name: react_frontend

    volumes:
      - ./frontend/react:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data:
